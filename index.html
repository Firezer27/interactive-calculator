<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Interactive Calculator</title>
  </head>
  <body>
    <main class="calculator">
      <div class="display">
        <div class="display__previous"></div>
        <div class="display__current"></div>
      </div>
      <div class="buttons">
        <button>+/-</button>
        <button data-percent="%">%</button>
        <button aria-label="Clear" data-clear="c">C</button>
        <button aria-label="All-clear" data-all-clear="ac">AC</button>
        <button data-number="7">7</button>
        <button data-number="8">8</button>
        <button data-number="9">9</button>
        <button aria-label="Divide" data-operator="/">/</button>
        <button data-number="4">4</button>
        <button data-number="5">5</button>
        <button data-number="6">6</button>
        <button aria-label="Multiply" data-operator="*">*</button>
        <button data-number="1">1</button>
        <button data-number="2">2</button>
        <button data-number="3">3</button>
        <button aria-label="Subtract" data-operator="-">-</button>
        <button aria-label="Decimal" data-decimal=".">.</button>
        <button data-number="0">0</button>
        <button aria-label="Equal" data-equal="=">=</button>
        <button aria-label="Add" data-operator="+">+</button>
      </div>
    </main>
  </body>
</html>
